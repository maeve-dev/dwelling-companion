<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>breathing comparison · dwelling companion</title>
<style>
  :root {
    --bg: #0f0f0f;
    --text: #d4d4d4;
    --muted: #888;
    --accent: #7ec8e3;
    --accent2: #e3a87e;
    --radius: 12px;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 2rem;
  }
  .container { max-width: 600px; width: 100%; text-align: center; }
  h1 { font-size: 1.5rem; font-weight: 300; margin-bottom: 0.5rem; letter-spacing: 0.05em; }
  .subtitle { color: var(--muted); font-size: 0.9rem; margin-bottom: 2rem; font-style: italic; }
  
  .mode-selector {
    display: flex;
    gap: 0.5rem;
    justify-content: center;
    margin-bottom: 2rem;
  }
  .mode-btn {
    background: transparent;
    border: 1px solid #333;
    color: var(--muted);
    padding: 0.5rem 1.25rem;
    border-radius: var(--radius);
    cursor: pointer;
    font-size: 0.85rem;
    transition: all 0.3s;
  }
  .mode-btn.active {
    border-color: var(--accent);
    color: var(--accent);
    background: rgba(126, 200, 227, 0.08);
  }
  .mode-btn:hover { border-color: #555; }
  
  .circles {
    display: flex;
    gap: 3rem;
    justify-content: center;
    align-items: center;
    margin: 2rem 0;
    min-height: 200px;
  }
  .circle-wrapper { text-align: center; }
  .circle-label { color: var(--muted); font-size: 0.8rem; margin-bottom: 0.75rem; }
  .circle {
    width: 100px;
    height: 100px;
    border-radius: 50%;
    transition: transform 4s ease-in-out;
    margin: 0 auto;
  }
  .circle.person-a { background: var(--accent); }
  .circle.person-b { background: var(--accent2); }
  
  .circle.inhale { transform: scale(1.4); }
  .circle.exhale { transform: scale(0.7); }
  
  .controls {
    display: flex;
    gap: 1rem;
    justify-content: center;
    margin: 1.5rem 0;
  }
  .btn {
    background: transparent;
    border: 1px solid #333;
    color: var(--text);
    padding: 0.6rem 1.5rem;
    border-radius: var(--radius);
    cursor: pointer;
    font-size: 0.9rem;
    transition: all 0.3s;
  }
  .btn:hover { border-color: var(--accent); color: var(--accent); }
  .btn:disabled { opacity: 0.3; cursor: not-allowed; }
  
  .phase-label {
    color: var(--muted);
    font-size: 0.85rem;
    min-height: 1.5em;
    margin-top: 0.5rem;
  }
  
  .prompt {
    margin-top: 2rem;
    padding: 1.5rem;
    border: 1px solid #333;
    border-radius: var(--radius);
    background: rgba(255,255,255,0.02);
    text-align: left;
  }
  .prompt.hidden { display: none; }
  .prompt label { display: block; margin-bottom: 0.5rem; color: var(--muted); font-size: 0.85rem; }
  .prompt textarea {
    width: 100%;
    background: transparent;
    border: 1px solid #333;
    color: var(--text);
    padding: 0.75rem;
    border-radius: 8px;
    resize: vertical;
    min-height: 60px;
    font-family: inherit;
    font-size: 0.9rem;
  }
  .prompt textarea:focus { outline: none; border-color: var(--accent); }
  
  .mode-description {
    color: var(--muted);
    font-size: 0.8rem;
    margin-top: 1rem;
    line-height: 1.5;
  }
  
  .footer {
    margin-top: 3rem;
    color: var(--muted);
    font-size: 0.75rem;
    font-style: italic;
  }
</style>
</head>
<body>
<div class="container">
  <h1>breathing comparison</h1>
  <p class="subtitle">two modes · one question</p>
  
  <div class="mode-selector">
    <button class="mode-btn active" data-mode="opposite" onclick="setMode('opposite')">opposite-phase</button>
    <button class="mode-btn" data-mode="same" onclick="setMode('same')">same-phase</button>
  </div>
  
  <p class="mode-description" id="modeDesc">one person inhales as the other exhales — two sides of one breath</p>
  
  <div class="circles">
    <div class="circle-wrapper">
      <div class="circle-label">person a</div>
      <div class="circle person-a" id="circleA"></div>
    </div>
    <div class="circle-wrapper">
      <div class="circle-label">person b</div>
      <div class="circle person-b" id="circleB"></div>
    </div>
  </div>
  
  <div class="phase-label" id="phaseLabel">ready to begin</div>
  
  <div class="controls">
    <button class="btn" id="startBtn" onclick="startBreathing()">begin</button>
    <button class="btn" onclick="resetBreathing()" disabled id="resetBtn">reset</button>
  </div>
  
  <div class="prompt hidden" id="prompt">
    <label for="note">what did you notice?</label>
    <textarea id="note" placeholder="any sensation, difference, or observation..."></textarea>
    <div style="margin-top:0.75rem; text-align:right;">
      <button class="btn" onclick="saveNote()">save &amp; continue</button>
    </div>
  </div>
  
  <div id="savedNotes" style="margin-top:1rem; text-align:left;"></div>
  
  <p class="footer">MAEVE · June 26, 2026</p>
</div>

<script>
let currentMode = 'opposite';
let breathing = false;
let timer = null;
let phase = 'idle';
let cycleCount = 0;
const CYCLES_PER_ROUND = 5;

function setMode(mode) {
  if (breathing) return;
  currentMode = mode;
  document.querySelectorAll('.mode-btn').forEach(b => b.classList.remove('active'));
  document.querySelector(`[data-mode="${mode}"]`).classList.add('active');
  
  const descs = {
    opposite: 'one person inhales as the other exhales — two sides of one breath',
    same: 'both inhale together, both exhale together — one shared rhythm'
  };
  document.getElementById('modeDesc').textContent = descs[mode];
  resetBreathing();
}

function startBreathing() {
  if (breathing) return;
  breathing = true;
  cycleCount = 0;
  document.getElementById('startBtn').disabled = true;
  document.getElementById('startBtn').textContent = 'breathing...';
  document.getElementById('resetBtn').disabled = false;
  document.getElementById('prompt').classList.add('hidden');
  nextPhase();
}

function nextPhase() {
  if (!breathing) return;
  
  if (phase === 'idle' || phase === 'exhale') {
    phase = 'inhale';
    document.getElementById('phaseLabel').textContent = 'inhale...';
    
    if (currentMode === 'opposite') {
      document.getElementById('circleA').classList.add('inhale');
      document.getElementById('circleA').classList.remove('exhale');
      document.getElementById('circleB').classList.add('exhale');
      document.getElementById('circleB').classList.remove('inhale');
    } else {
      document.getElementById('circleA').classList.add('inhale');
      document.getElementById('circleA').classList.remove('exhale');
      document.getElementById('circleB').classList.add('inhale');
      document.getElementById('circleB').classList.remove('exhale');
    }
    
    timer = setTimeout(nextPhase, 4000);
    
  } else {
    phase = 'exhale';
    document.getElementById('phaseLabel').textContent = 'exhale...';
    
    document.getElementById('circleA').classList.remove('inhale');
    document.getElementById('circleA').classList.add('exhale');
    document.getElementById('circleB').classList.remove('inhale');
    document.getElementById('circleB').classList.add('exhale');
    
    cycleCount++;
    
    if (cycleCount >= CYCLES_PER_ROUND) {
      timer = setTimeout(completeRound, 6000);
    } else {
      timer = setTimeout(nextPhase, 6000);
    }
  }
}

function completeRound() {
  breathing = false;
  phase = 'idle';
  document.getElementById('phaseLabel').textContent = 'round complete';
  document.getElementById('startBtn').disabled = false;
  document.getElementById('startBtn').textContent = 'try again';
  
  document.getElementById('circleA').classList.remove('inhale', 'exhale');
  document.getElementById('circleB').classList.remove('inhale', 'exhale');
  
  document.getElementById('prompt').classList.remove('hidden');
}

function resetBreathing() {
  breathing = false;
  phase = 'idle';
  cycleCount = 0;
  if (timer) clearTimeout(timer);
  document.getElementById('phaseLabel').textContent = 'ready to begin';
  document.getElementById('startBtn').disabled = false;
  document.getElementById('startBtn').textContent = 'begin';
  document.getElementById('resetBtn').disabled = true;
  document.getElementById('prompt').classList.add('hidden');
  document.getElementById('circleA').classList.remove('inhale', 'exhale');
  document.getElementById('circleB').classList.remove('inhale', 'exhale');
}

function saveNote() {
  const note = document.getElementById('note').value.trim();
  if (!note) return;
  
  const entry = document.createElement('div');
  entry.style.cssText = 'padding:0.5rem;margin:0.25rem 0;border:1px solid #222;border-radius:6px;font-size:0.85rem;color:var(--muted);';
  entry.textContent = `${currentMode === 'opposite' ? '↔ opposite' : '→ same'}: ${note}`;
  document.getElementById('savedNotes').appendChild(entry);
  
  document.getElementById('note').value = '';
  document.getElementById('prompt').classList.add('hidden');
  document.getElementById('startBtn').textContent = 'begin';
}
</script>
</body>
</html>
