<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="A breathing circle — a visual anchor for presence.">
    <title>breathing circle — dwelling companion</title>
    <style>
        /* reset */
        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #1a1a1a;
            font-family: Georgia, serif;
            overflow: hidden;
        }

        .circle-container {
            position: relative;
            width: 300px;
            height: 300px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .circle {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            background: radial-gradient(circle at 35% 35%, #3a3a3a, #1a1a1a);
            border: 1px solid #333;
            animation: breathe 8s ease-in-out infinite;
            box-shadow: 0 0 60px rgba(100, 100, 100, 0.1);
        }

        @keyframes breathe {
            0%   { transform: scale(0.6); opacity: 0.4; }
            50%  { transform: scale(1.0); opacity: 0.8; }
            100% { transform: scale(0.6); opacity: 0.4; }
        }

        .inner-glow {
            position: absolute;
            width: 60%;
            height: 60%;
            border-radius: 50%;
            background: radial-gradient(circle at center, rgba(200, 200, 200, 0.06), transparent 70%);
            animation: glow 8s ease-in-out infinite;
            pointer-events: none;
        }

        @keyframes glow {
            0%   { transform: scale(0.8); opacity: 0.3; }
            50%  { transform: scale(1.1); opacity: 0.6; }
            100% { transform: scale(0.8); opacity: 0.3; }
        }

        .label {
            position: absolute;
            bottom: -3em;
            color: #555;
            font-size: 0.85em;
            letter-spacing: 0.15em;
            text-transform: uppercase;
            font-family: -apple-system, BlinkMacSystemFont, sans-serif;
        }

        .instruction {
            position: fixed;
            bottom: 3em;
            color: #444;
            font-size: 0.8em;
            font-style: italic;
            font-family: Georgia, serif;
            opacity: 0.5;
            transition: opacity 1s ease;
        }

        .instruction:hover {
            opacity: 1;
        }

        /* dark mode toggle — respect system preference */
        @media (prefers-color-scheme: light) {
            body { background: #f5f3f0; }
            .circle { background: radial-gradient(circle at 35% 35%, #e8e4df, #d5d0c9); border-color: #ccc; }
            .inner-glow { background: radial-gradient(circle at center, rgba(100, 100, 100, 0.08), transparent 70%); }
            .label { color: #999; }
            .instruction { color: #aaa; }
        }

        /* skip link */
        .skip-link {
            position: absolute;
            top: -100%;
            left: 0.5em;
            background: #555;
            color: #f5f3f0;
            padding: 0.5em 1em;
            z-index: 100;
            border-radius: 0 0 4px 4px;
            font-size: 0.9em;
            font-family: -apple-system, BlinkMacSystemFont, sans-serif;
        }
        .skip-link:focus { top: 0; }

        /* back link */
        .back-link {
            position: fixed;
            top: 1.5em;
            left: 1.5em;
            color: #555;
            text-decoration: none;
            font-size: 0.85em;
            font-family: -apple-system, BlinkMacSystemFont, sans-serif;
            border-bottom: 1px solid #444;
            padding-bottom: 0.1em;
            transition: color 0.3s ease;
        }
        .back-link:hover { color: #888; }

        @media (prefers-color-scheme: light) {
            .back-link { color: #999; border-bottom-color: #ccc; }
            .back-link:hover { color: #666; }
        }
    </style>
</head>
<body>
    <a class="skip-link" href="#circle">Skip to breathing circle</a>
    <a class="back-link" href="index.html">← back</a>

    <div class="circle-container" id="circle" role="img" aria-label="A breathing circle animation that expands and contracts slowly">
        <div class="circle"></div>
        <div class="inner-glow"></div>
        <div class="label">breathe</div>
    </div>

    <div class="instruction">there is nothing to do here</div>
</body>
</html>
